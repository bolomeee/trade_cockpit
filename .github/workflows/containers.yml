name: Container verification

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose configuration
        run: |
          docker compose --env-file .env.example --profile prod config --quiet
          docker compose --env-file .env.example --profile dev config --quiet

      - name: Build production and development images
        run: docker compose --env-file .env.example --profile prod --profile dev build

      - name: Run backend tests
        run: >-
          docker compose --env-file .env.example --profile dev run --rm --no-deps backend-dev
          sh -c 'uv sync --frozen --no-install-project && pytest'

      # Existing application lint violations are kept visible without blocking
      # this infrastructure rollout. Remove continue-on-error when that legacy
      # baseline is cleaned up.
      - name: Audit frontend lint baseline
        continue-on-error: true
        run: >-
          docker compose --env-file .env.example --profile dev run --rm --no-deps frontend-dev
          sh -c 'pnpm install --frozen-lockfile --force && pnpm lint'

      - name: Run frontend tests and production build
        run: >-
          docker compose --env-file .env.example --profile dev run --rm --no-deps frontend-dev
          sh -c 'pnpm install --frozen-lockfile --force && pnpm test && pnpm build'

      - name: Verify production services
        run: |
          docker compose --env-file .env.example --profile prod up -d --wait
          curl --fail --silent --show-error http://127.0.0.1:8001/health > /dev/null
          curl --fail --silent --show-error http://127.0.0.1:8080/ > /dev/null

      - name: Tear down services
        if: always()
        run: docker compose --env-file .env.example --profile prod --profile dev down --volumes --remove-orphans
