<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 660">
<style>text { font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Inter, Arial, sans-serif; }</style>
<defs>
  <marker id="aB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
  <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#00000018"/></filter>
</defs>
<rect width="1280" height="660" fill="#f1f5f9"/>
<text x="640" y="28" font-size="17" font-weight="700" text-anchor="middle" fill="#0f172a">Cockpit · 交易决策工作台 — 使用指南</text>
<text x="640" y="46" font-size="10" text-anchor="middle" fill="#64748b">从市场判断到交易执行的完整工作流 · 每日 5 步骤</text>
<rect x="15" y="54" width="228" height="360" rx="9" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#sh)"/>
<rect x="15" y="54" width="228" height="34" rx="9" fill="#dcfce7"/>
<rect x="15" y="71" width="228" height="17" fill="#dcfce7"/>
<text x="25" y="76" font-size="11" font-weight="700" fill="#15803d">① 市场判断</text>
<rect x="23" y="92" width="212" height="18" rx="4" fill="#dcfce7"/>
<text x="129" y="105" font-size="8.5" font-weight="600" text-anchor="middle" fill="#15803d">Market Regime Widget</text>
<text x="23" y="119" font-size="9" font-weight="700" fill="#1e293b">看什么</text>
<text x="23" y="133" font-size="9" fill="#374151">制度分类 (5档: RISK_ON→RISK_OFF)</text>
<text x="23" y="149" font-size="9" fill="#374151">综合评分 0-100 + 6项分项分数</text>
<text x="23" y="165" font-size="9" fill="#374151">SPY·QQQ·IWM 价格+MA状态</text>
<text x="23" y="181" font-size="9" fill="#374151">11板块热力图 (颜色=板块强弱)</text>
<text x="23" y="197" font-size="9" fill="#374151">[AI] 市场笔记 (摘要+风险警示)</text>
<rect x="21" y="218" width="216" height="28" rx="4" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/>
<text x="129" y="228" font-size="8.5" font-weight="600" text-anchor="middle" fill="#78350f">今天适合交易吗？</text>
<text x="129" y="240" font-size="8.5" font-weight="600" text-anchor="middle" fill="#78350f">允许多少风险敞口？</text>
<text x="23" y="252" font-size="9" font-weight="700" fill="#1e293b">做什么</text>
<text x="23" y="266" font-size="9" fill="#374151">RISK_ON/CONSTRUCTIVE → 正常操作</text>
<text x="23" y="282" font-size="9" fill="#374151">NEUTRAL → 降仓+更严格筛选</text>
<text x="23" y="298" font-size="9" fill="#374151">DEFENSIVE/RISK_OFF → 观望/减仓</text>
<text x="23" y="314" font-size="9" fill="#374151">↻ 刷新 AI市场笔记</text>
<rect x="21" y="384" width="216" height="18" rx="9" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
<text x="129" y="397" font-size="8.5" text-anchor="middle" fill="#5b21b6">AI  市场笔记</text>
<rect x="271" y="54" width="228" height="360" rx="9" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#sh)"/>
<rect x="271" y="54" width="228" height="34" rx="9" fill="#dbeafe"/>
<rect x="271" y="71" width="228" height="17" fill="#dbeafe"/>
<text x="281" y="76" font-size="11" font-weight="700" fill="#1e40af">② 选股筛选</text>
<rect x="279" y="92" width="212" height="18" rx="4" fill="#dbeafe"/>
<text x="385" y="105" font-size="8.5" font-weight="600" text-anchor="middle" fill="#1e40af">Setup Monitor Widget</text>
<text x="279" y="119" font-size="9" font-weight="700" fill="#1e293b">看什么</text>
<text x="279" y="133" font-size="9" fill="#374151">标签: All/Ready/Near/Broken</text>
<text x="279" y="149" font-size="9" fill="#374151">候选: 类型/质量(A/B/C)/R:R比</text>
<text x="279" y="165" font-size="9" fill="#374151">Entry·Stop 入场与止损价</text>
<text x="279" y="181" font-size="9" fill="#374151">距入场% (绿色&lt;1%=可立即操作)</text>
<text x="279" y="197" font-size="9" fill="#374151">RS百分位 + 收益风险等级</text>
<text x="279" y="213" font-size="9" fill="#374151">[AI] 排序 → Top3推荐</text>
<rect x="277" y="234" width="216" height="28" rx="4" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/>
<text x="385" y="244" font-size="8.5" font-weight="600" text-anchor="middle" fill="#78350f">哪只股票现在最优先？</text>
<text x="385" y="256" font-size="8.5" font-weight="600" text-anchor="middle" fill="#78350f">哪只值得立刻关注？</text>
<text x="279" y="268" font-size="9" font-weight="700" fill="#1e293b">做什么</text>
<text x="279" y="282" font-size="9" fill="#374151">切 "Ready" 只看可操作的</text>
<text x="279" y="298" font-size="9" fill="#374151">点 "AI排序" → 获取Top3</text>
<text x="279" y="314" font-size="9" fill="#374151">点击行 → 图表+决策面板</text>
<text x="279" y="330" font-size="9" fill="#374151">? 按钮 → AI解释形态质量</text>
<rect x="277" y="362" width="216" height="18" rx="9" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
<text x="385" y="375" font-size="8.5" text-anchor="middle" fill="#5b21b6">AI  候选排序</text>
<rect x="277" y="384" width="216" height="18" rx="9" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
<text x="385" y="397" font-size="8.5" text-anchor="middle" fill="#5b21b6">AI  形态解读</text>
<rect x="527" y="54" width="228" height="360" rx="9" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#sh)"/>
<rect x="527" y="54" width="228" height="34" rx="9" fill="#fed7aa"/>
<rect x="527" y="71" width="228" height="17" fill="#fed7aa"/>
<text x="537" y="76" font-size="11" font-weight="700" fill="#c2410c">③ 图表确认</text>
<rect x="535" y="92" width="212" height="18" rx="4" fill="#fed7aa"/>
<text x="641" y="105" font-size="8.5" font-weight="600" text-anchor="middle" fill="#c2410c">Cockpit Chart Widget</text>
<text x="535" y="119" font-size="9" font-weight="700" fill="#1e293b">看什么</text>
<text x="535" y="133" font-size="9" fill="#374151">250日K线 + 成交量柱</text>
<text x="535" y="149" font-size="9" fill="#374151">MA10/21/50/150/200 彩色均线</text>
<text x="535" y="165" font-size="9" fill="#374151">入场价线 (绿色实线)</text>
<text x="535" y="181" font-size="9" fill="#374151">止损价线 (红色虚线)</text>
<text x="535" y="197" font-size="9" fill="#374151">目标2R·3R (蓝色点线)</text>
<text x="535" y="213" font-size="9" fill="#374151">AVWAP 锚定均线 (紫色)</text>
<rect x="533" y="234" width="216" height="28" rx="4" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/>
<text x="641" y="244" font-size="8.5" font-weight="600" text-anchor="middle" fill="#78350f">入场结构合理吗？</text>
<text x="641" y="256" font-size="8.5" font-weight="600" text-anchor="middle" fill="#78350f">趋势完整值得进入？</text>
<text x="535" y="268" font-size="9" font-weight="700" fill="#1e293b">做什么</text>
<text x="535" y="282" font-size="9" fill="#374151">确认价格在MA150上方</text>
<text x="535" y="298" font-size="9" fill="#374151">检查突破点成交量放大</text>
<text x="535" y="314" font-size="9" fill="#374151">核对Entry→Stop距离合理</text>
<text x="535" y="330" font-size="9" fill="#374151">跌破关键均线 → 跳过</text>
<rect x="783" y="54" width="228" height="360" rx="9" fill="#fdf4ff" stroke="#d8b4fe" stroke-width="1.5" filter="url(#sh)"/>
<rect x="783" y="54" width="228" height="34" rx="9" fill="#f3e8ff"/>
<rect x="783" y="71" width="228" height="17" fill="#f3e8ff"/>
<text x="793" y="76" font-size="11" font-weight="700" fill="#6b21a8">④ 交易计划</text>
<rect x="791" y="92" width="212" height="18" rx="4" fill="#f3e8ff"/>
<text x="897" y="105" font-size="8.5" font-weight="600" text-anchor="middle" fill="#6b21a8">Decision Panel Widget</text>
<text x="791" y="119" font-size="9" font-weight="700" fill="#1e293b">看什么</text>
<text x="791" y="133" font-size="9" fill="#374151">Entry/Stop/Target 2R·3R</text>
<text x="791" y="149" font-size="9" fill="#374151">建议股数 + 总仓位金额</text>
<text x="791" y="165" font-size="9" fill="#374151">账户风险% (制度上限校验)</text>
<text x="791" y="181" font-size="9" fill="#374151">距财报天数 D-N</text>
<text x="791" y="197" font-size="9" fill="#374151">覆盖 Entry/Stop/Risk%</text>
<text x="791" y="213" font-size="9" fill="#374151">[AI] 矛盾检测 LOW/MED/HIGH</text>
<text x="791" y="229" font-size="9" fill="#374151">[AI] 交易计划 执行备忘录</text>
<rect x="789" y="250" width="216" height="28" rx="4" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/>
<text x="897" y="260" font-size="8.5" font-weight="600" text-anchor="middle" fill="#78350f">仓位合适吗？</text>
<text x="897" y="272" font-size="8.5" font-weight="600" text-anchor="middle" fill="#78350f">有没有被忽视的风险？</text>
<text x="791" y="284" font-size="9" font-weight="700" fill="#1e293b">做什么</text>
<text x="791" y="298" font-size="9" fill="#374151">核查风险% ≤ 制度上限</text>
<text x="791" y="314" font-size="9" fill="#374151">先看AI矛盾 HIGH→慎重</text>
<text x="791" y="330" font-size="9" fill="#374151">生成AI计划 → 记录管理规则</text>
<text x="791" y="346" font-size="9" fill="#374151">确认 → 挂单或直接执行</text>
<rect x="789" y="362" width="216" height="18" rx="9" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
<text x="897" y="375" font-size="8.5" text-anchor="middle" fill="#5b21b6">AI  矛盾检测</text>
<rect x="789" y="384" width="216" height="18" rx="9" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
<text x="897" y="397" font-size="8.5" text-anchor="middle" fill="#5b21b6">AI  交易计划</text>
<rect x="1039" y="54" width="228" height="360" rx="9" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.5" filter="url(#sh)"/>
<rect x="1039" y="54" width="228" height="34" rx="9" fill="#e0f2fe"/>
<rect x="1039" y="71" width="228" height="17" fill="#e0f2fe"/>
<text x="1049" y="76" font-size="11" font-weight="700" fill="#075985">⑤ 执行·监控</text>
<rect x="1047" y="92" width="212" height="18" rx="4" fill="#e0f2fe"/>
<text x="1153" y="105" font-size="8.5" font-weight="600" text-anchor="middle" fill="#075985">Positions · Pending · Actions</text>
<text x="1047" y="119" font-size="9" font-weight="700" fill="#1e293b">看什么</text>
<text x="1047" y="133" font-size="9" fill="#374151">持仓: P/L · Stop · 收益风险</text>
<text x="1047" y="149" font-size="9" fill="#374151">挂单: 距触发% (临近时关注)</text>
<text x="1047" y="165" font-size="9" fill="#374151">[必] Must Act — 立即处理</text>
<text x="1047" y="181" font-size="9" fill="#374151">[注] Monitor — 关注但不动</text>
<text x="1047" y="197" font-size="9" fill="#374151">[稳] No Action — 安全持有</text>
<rect x="1045" y="218" width="216" height="28" rx="4" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/>
<text x="1153" y="228" font-size="8.5" font-weight="600" text-anchor="middle" fill="#78350f">今天哪个持仓需要动？</text>
<text x="1153" y="240" font-size="8.5" font-weight="600" text-anchor="middle" fill="#78350f">挂单是否接近触发？</text>
<text x="1047" y="252" font-size="9" font-weight="700" fill="#1e293b">做什么</text>
<text x="1047" y="266" font-size="9" fill="#374151">Must Act → 止损/止盈/减仓</text>
<text x="1047" y="282" font-size="9" fill="#374151">挂单临近触发 → 确认保留</text>
<text x="1047" y="298" font-size="9" fill="#374151">+ 新挂单 → 等待入场信号</text>
<text x="1047" y="314" font-size="9" fill="#374151">点Ticker → 图表查看走势</text>
<line x1="246" y1="234" x2="268" y2="234" stroke="#2563eb" stroke-width="2.5" marker-end="url(#aB)"/>
<line x1="502" y1="234" x2="524" y2="234" stroke="#2563eb" stroke-width="2.5" marker-end="url(#aB)"/>
<line x1="758" y1="234" x2="780" y2="234" stroke="#2563eb" stroke-width="2.5" marker-end="url(#aB)"/>
<line x1="1014" y1="234" x2="1036" y2="234" stroke="#2563eb" stroke-width="2.5" marker-end="url(#aB)"/>
<rect x="15" y="430" width="770" height="112" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/>
<text x="25" y="448" font-size="11" font-weight="700" fill="#334155">Pool Builder — 研究候选池（周末 / 盘前使用）</text>
<text x="25" y="466" font-size="9.5" fill="#475569">看: 5阶段漏斗 (Tradable→Trend→RS→Fund→Action) + 11板块过滤 + 候选的趋势/RS/形态/财报/营收增长</text>
<text x="25" y="482" font-size="9.5" fill="#475569">做: 点 [+] 将感兴趣的股票加入 Watchlist → 进入 Setup Monitor 参与每日扫描</text>
<rect x="25" y="490" width="335" height="18" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="192" y="503" font-size="8.5" text-anchor="middle" fill="#94a3b8">是 Setup Monitor 的候选来源，形成完整研究闭环</text>
<text x="25" y="526" font-size="9" fill="#94a3b8">提示: 通常一周研究一次 · 不需要每天使用 · 量大时用板块过滤</text>
<rect x="800" y="430" width="465" height="112" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5" filter="url(#sh)"/>
<text x="812" y="448" font-size="11" font-weight="700" fill="#78350f">每日盘中巡查（持续监控）</text>
<text x="812" y="466" font-size="10" fill="#ef4444">&#9632;</text>
<text x="826" y="466" font-size="9" font-weight="600" fill="#1e293b">Action List — Must Act</text>
<text x="812" y="479" font-size="9" fill="#475569">当天必须处理：止损 / 止盈 / 减仓 / 规避财报</text>
<text x="812" y="492" font-size="10" fill="#f59e0b">&#9632;</text>
<text x="826" y="492" font-size="9" font-weight="600" fill="#1e293b">Position List — 持仓状态</text>
<text x="812" y="505" font-size="9" fill="#475569">当前P/L · Stop距离 · 下一财报日期</text>
<text x="812" y="518" font-size="10" fill="#3b82f6">&#9632;</text>
<text x="826" y="518" font-size="9" font-weight="600" fill="#1e293b">Pending Orders — 挂单</text>
<text x="812" y="531" font-size="9" fill="#475569">每单距触发% · 临近触发时确认是否保留</text>
<rect x="15" y="552" width="1250" height="52" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="25" y="568" font-size="9.5" font-weight="700" fill="#374151">说明:</text>
<rect x="82" y="557" width="68" height="16" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
<text x="116" y="568" font-size="8" text-anchor="middle" fill="#5b21b6">AI 功能</text>
<text x="158" y="568" font-size="9" fill="#374151">= 点击触发，结果可缓存复用</text>
<rect x="360" y="557" width="68" height="16" rx="3" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/>
<text x="394" y="568" font-size="8" text-anchor="middle" fill="#78350f">关键问题</text>
<text x="436" y="568" font-size="9" fill="#374151">= 每阶段的核心决策问题</text>
<text x="640" y="568" font-size="9" fill="#374151">蓝色箭头 = 主工作流推进方向（每天从左到右走一遍）</text>
<text x="25" y="592" font-size="9" fill="#94a3b8">完整流程: ①确认制度 → ②筛选候选 → ③图表确认 → ④规划交易 → ⑤执行监控 | Pool Builder 补充新候选来源</text>
<text x="1265" y="654" font-size="8" text-anchor="end" fill="#94a3b8">Cockpit · stock_portal · 2026-04-29</text>
</svg>